<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="trackA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="100%" style="stop-color:#1a6329"/>
    </linearGradient>
    <linearGradient id="trackB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#1158c7"/>
    </linearGradient>
    <linearGradient id="trackC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8957e5"/>
      <stop offset="100%" style="stop-color:#6e40c9"/>
    </linearGradient>
    <linearGradient id="trackD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3b341"/>
      <stop offset="100%" style="stop-color:#bb8009"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)" rx="12"/>
  <rect width="900" height="320" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" fill="#f0f6fc" font-size="16" font-weight="bold">sketch-to-vue  Workflow</text>
  <line x1="200" y1="44" x2="700" y2="44" stroke="#30363d" stroke-width="1"/>

  <!-- ===== INPUT COLUMN ===== -->
  <text x="110" y="68" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="1">INPUT</text>

  <!-- Sketch MeaXure box -->
  <rect x="30" y="76" width="160" height="52" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="110" y="97" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">Sketch MeaXure</text>
  <text x="110" y="112" text-anchor="middle" fill="#8b949e" font-size="9">HTML export + assets</text>
  <text x="110" y="124" text-anchor="middle" fill="#8b949e" font-size="9">_all_elements.json</text>

  <!-- MasterGo Export box -->
  <rect x="30" y="140" width="160" height="52" rx="8" fill="#161b22" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="110" y="161" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">MasterGo Export</text>
  <text x="110" y="176" text-anchor="middle" fill="#8b949e" font-size="9">ZIP package</text>
  <text x="110" y="188" text-anchor="middle" fill="#8b949e" font-size="9">layers + assets</text>

  <!-- MasterGo MCP box -->
  <rect x="30" y="204" width="160" height="52" rx="8" fill="#161b22" stroke="#8957e5" stroke-width="1.5"/>
  <text x="110" y="225" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="bold">MasterGo MCP</text>
  <text x="110" y="240" text-anchor="middle" fill="#8b949e" font-size="9">Online DSL</text>
  <text x="110" y="252" text-anchor="middle" fill="#8b949e" font-size="9">real-time layer data</text>

  <!-- Arrows input -> engine -->
  <line x1="190" y1="102" x2="248" y2="130" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="190" y1="166" x2="248" y2="155" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="190" y1="230" x2="248" y2="182" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
  </defs>

  <!-- ===== ENGINE COLUMN ===== -->
  <text x="390" y="68" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="1">PROCESSING ENGINE</text>

  <rect x="250" y="76" width="280" height="216" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Stage 1 -->
  <rect x="265" y="88" width="250" height="34" rx="6" fill="url(#trackA)" opacity="0.9"/>
  <text x="390" y="101" text-anchor="middle" fill="#f0f6fc" font-size="10" font-weight="bold">Stage 1  Extract</text>
  <text x="390" y="114" text-anchor="middle" fill="#d2f4dc" font-size="8.5">parse HTML / ZIP / MCP  ->  all_elements.json</text>

  <!-- Stage 2 -->
  <rect x="265" y="130" width="250" height="34" rx="6" fill="#1c2128" stroke="#3fb950" stroke-width="1" opacity="0.9"/>
  <text x="390" y="143" text-anchor="middle" fill="#f0f6fc" font-size="10" font-weight="bold">Stage 2  Scene Graph  (TSG)</text>
  <text x="390" y="156" text-anchor="middle" fill="#8b949e" font-size="8.5">type + disposition + chart detection</text>

  <!-- Stage 3 -->
  <rect x="265" y="172" width="250" height="34" rx="6" fill="url(#trackB)" opacity="0.9"/>
  <text x="390" y="185" text-anchor="middle" fill="#f0f6fc" font-size="10" font-weight="bold">Stage 3  Layout Decision</text>
  <text x="390" y="198" text-anchor="middle" fill="#dbeafe" font-size="8.5">layer order  z-index  absolute coords</text>

  <!-- Stage 4 -->
  <rect x="265" y="214" width="250" height="34" rx="6" fill="url(#trackC)" opacity="0.9"/>
  <text x="390" y="227" text-anchor="middle" fill="#f0f6fc" font-size="10" font-weight="bold">Stage 4  Vue Emit</text>
  <text x="390" y="240" text-anchor="middle" fill="#e9d8fd" font-size="8.5">gen-vue-from-scene-graph.mjs</text>

  <!-- Arrow engine -> output -->
  <line x1="530" y1="165" x2="590" y2="165" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== OUTPUT COLUMN ===== -->
  <text x="745" y="68" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="1">OUTPUT</text>

  <rect x="592" y="76" width="275" height="216" rx="10" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="730" y="97" text-anchor="middle" fill="#e3b341" font-size="12" font-weight="bold">Vue Component</text>
  <text x="730" y="112" text-anchor="middle" fill="#8b949e" font-size="9">Index.vue  + assets</text>
  <line x1="612" y1="120" x2="852" y2="120" stroke="#21262d" stroke-width="1"/>

  <rect x="610" y="130" width="118" height="26" rx="5" fill="#161b22" stroke="#238636" stroke-width="1"/>
  <text x="669" y="147" text-anchor="middle" fill="#3fb950" font-size="9">Pixel-Perfect Layout</text>

  <rect x="740" y="130" width="118" height="26" rx="5" fill="#161b22" stroke="#1f6feb" stroke-width="1"/>
  <text x="799" y="147" text-anchor="middle" fill="#58a6ff" font-size="9">Vue 2 / Vue 3</text>

  <rect x="610" y="164" width="118" height="26" rx="5" fill="#161b22" stroke="#8957e5" stroke-width="1"/>
  <text x="669" y="181" text-anchor="middle" fill="#bc8cff" font-size="9">ECharts Binding</text>

  <rect x="740" y="164" width="118" height="26" rx="5" fill="#161b22" stroke="#e3b341" stroke-width="1"/>
  <text x="799" y="181" text-anchor="middle" fill="#e3b341" font-size="9">Asset Audit</text>

  <rect x="610" y="198" width="118" height="26" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="669" y="215" text-anchor="middle" fill="#3fb950" font-size="9">Gradient / Shadow</text>

  <rect x="740" y="198" width="118" height="26" rx="5" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="799" y="215" text-anchor="middle" fill="#58a6ff" font-size="9">Big-Screen Scale</text>

  <rect x="610" y="232" width="248" height="50" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="734" y="249" text-anchor="middle" fill="#8b949e" font-size="8.5" font-family="monospace">&lt;template&gt; + &lt;script&gt; + &lt;style&gt;</text>
  <text x="734" y="263" text-anchor="middle" fill="#58a6ff" font-size="8.5" font-family="monospace">No manual CSS guesswork</text>
  <text x="734" y="277" text-anchor="middle" fill="#3fb950" font-size="8.5" font-family="monospace">All assets resolved deterministically</text>
</svg>
