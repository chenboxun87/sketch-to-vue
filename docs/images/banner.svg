<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bgBanner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="50%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#8957e5"/>
    </linearGradient>
  </defs>

  <rect width="860" height="200" fill="url(#bgBanner)" rx="12"/>
  <rect width="860" height="200" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <!-- decorative corner dots -->
  <circle cx="30" cy="30" r="4" fill="#238636" opacity="0.6"/>
  <circle cx="44" cy="30" r="4" fill="#e3b341" opacity="0.6"/>
  <circle cx="58" cy="30" r="4" fill="#f85149" opacity="0.6"/>

  <!-- Title -->
  <text x="430" y="82" text-anchor="middle" fill="url(#titleGrad)" font-size="38" font-weight="900" letter-spacing="-1">sketch-to-vue</text>

  <!-- Subtitle line 1 -->
  <text x="430" y="110" text-anchor="middle" fill="#8b949e" font-size="13">
    Sketch MeaXure  &#9670;  MasterGo  &#9670;  Pixel-Perfect Vue 2 / Vue 3
  </text>

  <!-- Subtitle line 2 -->
  <text x="430" y="130" text-anchor="middle" fill="#6e7681" font-size="11">
    AI Skill for Claude Code &amp; Cursor  &#9670;  Dashboard  &#9670;  Cockpit  &#9670;  Big-Screen  &#9670;  ECharts
  </text>

  <!-- Color bar -->
  <rect x="200" y="148" width="460" height="4" rx="2" fill="url(#barGrad)" opacity="0.8"/>

  <!-- Badges row -->
  <rect x="199" y="162" width="82" height="20" rx="4" fill="#238636" opacity="0.85"/>
  <text x="240" y="176" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="600">CC BY-NC-ND 4.0</text>

  <rect x="289" y="162" width="66" height="20" rx="4" fill="#1f6feb" opacity="0.85"/>
  <text x="322" y="176" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="600">Vue 2 | Vue 3</text>

  <rect x="363" y="162" width="78" height="20" rx="4" fill="#6e40c9" opacity="0.85"/>
  <text x="402" y="176" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="600">Claude Code</text>

  <rect x="449" y="162" width="54" height="20" rx="4" fill="#2d333b" stroke="#30363d" stroke-width="1"/>
  <text x="476" y="176" text-anchor="middle" fill="#c9d1d9" font-size="9" font-weight="600">Cursor</text>

  <rect x="511" y="162" width="70" height="20" rx="4" fill="#2d333b" stroke="#30363d" stroke-width="1"/>
  <text x="546" y="176" text-anchor="middle" fill="#c9d1d9" font-size="9" font-weight="600">Node 18+</text>
</svg>
